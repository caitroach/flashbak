name: flashbak
options:
  bundleIdPrefix: com.cait
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: NO
    TARGETED_DEVICE_FAMILY: "1"   # iPhone only

targets:
  flashbak:
    type: application
    platform: iOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "flashbak needs camera access to capture photos."
        NSPhotoLibraryAddUsageDescription: "flashbak saves photos directly to your camera roll."
        NSMicrophoneUsageDescription: "flaskbak may use the microphone for video in future."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cait.flashbak
        PRODUCT_NAME: flashbak
        INFOPLIST_FILE: Sources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon